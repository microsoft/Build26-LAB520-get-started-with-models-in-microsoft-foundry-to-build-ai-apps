# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: get-started-foundry-models
metadata:
    template: get-started-foundry-models@0.1.0
services:
    zava-review-moderation-agent:
        project: src/agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1.0"
                    memory: 2.0Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-5.4-mini
                    version: "2026-03-17"
                  name: gpt-5.4-mini
                  sku:
                    capacity: 37500
                    name: GlobalStandard
hooks:
    postprovision:
        windows:
            name: postprovision
            kind: pwsh
            shell: pwsh
            run: ./scripts/postprovision.ps1
        posix:
            shell: sh
            run: ./scripts/postprovision.sh
