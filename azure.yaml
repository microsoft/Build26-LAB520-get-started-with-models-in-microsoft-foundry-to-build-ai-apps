# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: get-started-foundry-models
metadata:
    template: get-started-foundry-models@0.1.0
services:
    get-started-with-models-microsoft-foundry:
        project: src/agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1.0"
                    memory: 2.0Gi
                scale:
                    maxReplicas: 1
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1-mini
                    version: "2025-04-14"
                  name: gpt-4.1-mini
                  sku:
                    capacity: 37500
                    name: GlobalStandard
hooks:
    postprovision:
        windows:
            name: postprovision
            kind: pwsh
            shell: pwsh
            run: ./scripts/postprovision.ps1
        posix:
            shell: sh
            run: ./scripts/postprovision.sh
